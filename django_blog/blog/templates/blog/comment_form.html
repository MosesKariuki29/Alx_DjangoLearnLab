{% extends 'blog/base.html' %}
{% block title %}Edit Comment{% endblock %}
{% block content %}
<h2>Edit Comment</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Update Comment</button>
    <a href="javascript:history.back()">Cancel</a>
</form>
{% endblock %}
