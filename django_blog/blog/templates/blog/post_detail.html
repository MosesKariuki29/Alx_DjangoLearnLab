{% extends 'blog/base.html' %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
<div class="post-card">
    <h2>{{ post.title }}</h2>
    <p class="meta">By {{ post.author.username }} on {{ post.published_date|date:"F d, Y" }}</p>
    <p>{{ post.content }}</p>

    {% if user == post.author %}
        <a href="{% url 'post-edit' post.pk %}" class="btn btn-primary">Edit</a>
        <a href="{% url 'post-delete' post.pk %}" class="btn btn-danger">Delete</a>
    {% endif %}
</div>
{% endblock %}
