{% extends 'blog/base.html' %}
{% block title %}{% if object %}Edit Post{% else %}New Post{% endif %}{% endblock %}
{% block content %}
<h2>{% if object %}Edit Post{% else %}Create New Post{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">
        {% if object %}Update{% else %}Publish{% endif %}
    </button>
    <a href="{% url 'post-list' %}">Cancel</a>
</form>
{% endblock %}
